<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="RoyalTree">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#241a2e"/>
      <stop offset="1" stop-color="#140e1c"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f3d68a"/>
      <stop offset="1" stop-color="#c89b3c"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- crown -->
  <path d="M22 17 L26 22 L32 15 L38 22 L42 17 L41 25 L23 25 Z" fill="url(#gold)"/>
  <circle cx="22" cy="15.5" r="1.8" fill="url(#gold)"/>
  <circle cx="32" cy="13" r="1.8" fill="url(#gold)"/>
  <circle cx="42" cy="15.5" r="1.8" fill="url(#gold)"/>
  <!-- tree: trunk + branches -->
  <path d="M32 28 L32 48" stroke="url(#gold)" stroke-width="3.2" stroke-linecap="round"/>
  <path d="M32 36 L24 30 M32 36 L40 30 M32 42 L26 38 M32 42 L38 38"
        stroke="url(#gold)" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <!-- roots / base -->
  <path d="M25 49 Q32 53 39 49" stroke="url(#gold)" stroke-width="2.2" stroke-linecap="round" fill="none"/>
</svg>
